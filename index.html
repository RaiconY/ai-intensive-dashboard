<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI INTENSIVE // Практикум</title>
  <link rel="stylesheet" href="./css/blood-dragon.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐉</text></svg>">
</head>
<body>
  <div class="mobile-notice" id="mobile-notice" hidden>
    <div class="mobile-notice__card">
      <p class="mobile-notice__title">// HEADS UP, COWBOY</p>
      <p class="mobile-notice__text">Страница не адаптирована под мобильные. Открой с компа, чтобы всё отобразилось корректно.</p>
      <button class="mobile-notice__ok" type="button" id="mobile-notice-ok">OK</button>
    </div>
  </div>
  <div class="container">
    <header>
      <div class="music-player" id="music-player">
        <button class="music-btn" id="music-prev" title="Предыдущий трек">⏮</button>
        <button class="music-btn music-btn-main" id="music-toggle" title="Play / Pause">▶</button>
        <button class="music-btn" id="music-next" title="Следующий трек">⏭</button>
        <span class="music-track-name" id="music-track-name">BLOOD DRAGON OST</span>
        <input type="range" class="music-volume" id="music-volume" min="0" max="100" value="30">
      </div>
      <audio id="music-audio" preload="auto"></audio>
      <h1>AI INTENSIVE</h1>
      <p class="tagline">Beware of Blood Dragon</p>
      <p class="subtitle">
        <span id="cohort-name">Загрузка...</span> //
        <span id="cohort-dates"></span>
      </p>
    </header>

    <section class="progress-section">
      <h2>// ПРОГРЕСС МИССИИ</h2>
      <div class="progress-track" id="progress-track">
        <!-- Rendered by JS -->
      </div>
    </section>

    <section class="checkins-section">
      <h2>// СТАТУС ЧЕКИНОВ</h2>
      <table class="checkins-table" id="checkins-table">
        <!-- Rendered by JS -->
      </table>
    </section>
  </div>

  <script src="./js/dashboard.js"></script>
  <script>
    (function () {
      if (!window.matchMedia('(max-width: 768px)').matches) return;
      if (sessionStorage.getItem('mobile-notice-dismissed') === '1') return;
      var el = document.getElementById('mobile-notice');
      var btn = document.getElementById('mobile-notice-ok');
      if (!el || !btn) return;
      el.hidden = false;
      btn.addEventListener('click', function () {
        el.hidden = true;
        sessionStorage.setItem('mobile-notice-dismissed', '1');
      });
    })();
  </script>
</body>
</html>
